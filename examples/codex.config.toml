# Salin ke ~/.codex/config.toml (gabungkan dengan entri lain).
# Set META_ADS_MCP_TOKEN di Windows User env terlebih dahulu — lihat docs/codex.md

[mcp_servers.meta_ads_mcp]
url = "https://meta-ads.clowy.biz.id/mcp"
bearer_token_env_var = "META_ADS_MCP_TOKEN"

# CLI setara:
#   codex mcp add meta_ads_mcp --url "https://meta-ads.clowy.biz.id/mcp" --bearer-token-env-var META_ADS_MCP_TOKEN
